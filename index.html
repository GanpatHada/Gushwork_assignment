<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghuswork</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./assets/icons/logo.svg" />
    <!-- Global Styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Header / Navigation Bar -->
    <header class="navbar-container">
      <div class="container">
        <nav class="navbar">
          <div class="logo">
            <img src="./assets/icons/logo.svg" alt="Mangalam logo" />
          </div>
          <div class="menu">
            <a href="#">About Us</a>
            <select id="products">
              <option>Products</option>
              <option>Wires</option>
              <option>Coils</option>
              <option>Pipes</option>
            </select>
            <button class="contact-btn">Contact Us</button>
          </div>
        </nav>
      </div>
    </header>

    <!-- Breadcrumb Navigation -->
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <main>
      <!-- Hero Section: Product Spotlight -->
      <section class="hero">
        <div class="container">
          <div class="product-details-container">
            <div class="carousal"></div>
            <div class="product-details">
              <div class="badges"></div>
              <h1>Premium HDPE Pipes & Coils for Modern Infrastructure</h1>
              <ul class="features"></ul>

              <div class="price-card"></div>

              <div class="cta-buttons"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Banner: Trusted Companies / Social Proof -->
      <section class="banner">
        <div class="container">
          <div class="banner-content">Trusted by Hundreds of Companies Globally</div>
          <div class="company-logos"></div>
        </div>
      </section>

      <!-- Technical Specifications Section -->
      <section class="specifications-container">
        <div class="container"></div>
      </section>

      <!-- Product Features Cards -->
      <section class="features-cards"></section>

      <!-- Frequently Asked Questions (FAQ) Section -->
      <section class="faq">
        <div class="container"></div>
      </section>

      <!-- Applications / Use Cases Section -->
      <section class="applications">
        <div class="container"></div>
      </section>

      <!-- Manufacturing / Order Process Section -->
      <section class="process">
        <div class="container"></div>
      </section>

      <!-- Client Testimonials Section -->
      <section class="testimonials">
        <div class="container"></div>
      </section>

      <!-- Portfolio / Project Showcase Section -->
      <section class="portfolio">
        <div class="container"></div>
      </section>

      <!-- Resources / Documentation Section -->
      <section class="resources">
        <div class="container"></div>
      </section>

      <!-- Contact Us / Lead Generation Section -->
      <section class="contact-us">
        <div class="container"></div>
      </section>
    </main>

    <!-- Footer Section -->
    <footer class="footer">
      <div class="container"></div>
    </footer>

    <!-- Main JavaScript File (Entry Point) -->
    <script type="module" src="script.js"></script>
  </body>
</html>
